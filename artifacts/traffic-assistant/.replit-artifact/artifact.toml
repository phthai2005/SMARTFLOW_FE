kind = "web"
previewPath = "/"
title = "Traffic Assistant Admin"
version = "1.0.0"
id = "artifacts/traffic-assistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24771

[services.development]
run = "pnpm --filter @workspace/traffic-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traffic-assistant", "run", "build" ]
publicDir = "artifacts/traffic-assistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24771"
BASE_PATH = "/"
